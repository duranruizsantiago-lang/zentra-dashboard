<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
  <meta name="description"
    content="Zentra — Panel de control inteligente para tu negocio. Asistente IA de ventas por WhatsApp." />
  <meta name="theme-color" content="#eef2f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0c1222" media="(prefers-color-scheme: dark)" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https: http://127.0.0.1:* http://localhost:*;" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zentra" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <title>Zentra — Dashboard</title>
  <!-- Blocking script: apply dark theme BEFORE first paint to prevent white flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('zentra-theme');
        if (t === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.backgroundColor = '#0c1222';
        }
      } catch (e) { }
    })();
  </script>
  <style>
    body {
      margin: 0;
      background: var(--bg-primary, #f0f4f8);
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
